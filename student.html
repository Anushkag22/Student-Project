<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workly</title>
</head>
<body>

  
    <div class="homepage">
        <header class="navbar">
            <div class="logo-section">
                <h2 class="logo">Workly</h2>
            </div>
            <main>
                <table>
                    <tr>
                    <td>
                    <section class="card">
                    <h2 class="sub-heading">Student Registration</h2>
                    <form class="student-form">
                    <label>Full Name</label><br>
                    <input type="text" placeholder="Enter your full name" required><br>
                    <label>Email</label><br>
                    <input type="email" placeholder="Enter your email" required><br>
                    <label>Set Password</label><br>
                    <input type="password" placeholder="Create Password" required><br>
                    <label>Phone</label><br>
                    <input type="tel" placeholder="Phone" required><br>
                    <label>College/University</label><br>
                    <input type="email" placeholder="Enter your email" required><br>
                    <label>LinkedIn Profile</label><br>
                    <input type="text" placeholder="Enter your linkedIn Account" required><br>
                    <label>Skills</label><br>
                    <input type="checkbox" name="skills" value="Web Development"> Web Development<br>
                    <input type="checkbox" name="skills" value="Video/Photo Editing"> Video/Photo Editing<br>
                    <input type="checkbox" name="skills" value="UI/UX Design"> UI/UX Design<br>
                    <input type="checkbox" name="skills" value="Data Analysis"> Data Analysis<br>
                    <input type="checkbox" name="skills" value="Marketing"> Marketing<br>
                    <input type="checkbox" name="skills" value="Finance and Accounts"> Finance and Accounts<br>
                    <input type="checkbox" name="skills" value="Data Entry"> Data Entry<br>
                    <input type="checkbox" name="skills" value="Business Consultant"> Business Consultant<br>
                    <input type="checkbox" name="skills" value="Financial Analyst"> Financial Analyst<br>
                    <input type="checkbox" name="skills" value="SEO Specialist"> SEO Specialist<br>
                    <input type="checkbox" name="skills" value="Content Writer"> Content Writer<br>
                    <label>Language Preference</label><br>
                    <input type="checkbox" name="lang" value="English">English<br>
                    <input type="checkbox" name="lang" value="Hindi">Hindi<br>
                    <label>Resume</label><br>
                    <input type="file" name="resume"><br>
                    <button class="btn" type="button">Register</button>
                    </section>
                    </form>
                </td>
                <td>
                    <h2 class="sub-heading">Login</h2>
                    <label>Email</label><br>
                    <input type="email" placeholder="Enter your email" required><br>
                    <label>Password</label><br>
                    <input type="password" placeholder="Enter Password" required><br>
                </td>
                </tr>
                </table>
            </main>
    </div>

</body>
</html>
